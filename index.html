<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>도기탐정: 태양풍 방어 - 하드코어 에디션</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00F2FE;
            --secondary: #FFD700;
            --accent: #FF0055;
            --bg-dark: #0A0A1A;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --danger: #FF4B2B;
            --success: #00E676;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
        }

        body, html {
            width: 100%; height: 100%;
            background: var(--bg-dark);
            color: #fff;
            overflow: hidden;
            position: fixed;
        }

        #app {
            width: 100%; height: 100%;
            max-width: 480px; margin: 0 auto;
            position: relative;
            background: #000;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Screens */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            padding: 20px;
            background-size: cover;
            background-position: center;
            transition: opacity 0.5s ease;
        }

        .screen.active { display: flex; animation: fadeIn 0.5s ease forwards; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* HUD */
        #hud-top {
            position: absolute;
            top: 15px; left: 15px; right: 15px;
            height: 60px;
            display: none;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 0 15px;
        }

        .hud-item { display: flex; flex-direction: column; align-items: center; }
        .hud-label { font-size: 10px; color: var(--primary); text-transform: uppercase; font-weight: bold; }
        .hud-val { font-size: 18px; font-weight: bold; font-variant-numeric: tabular-nums; }

        #progress-container { flex: 1; margin: 0 15px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; position: relative; }
        #hud-progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); transition: width 0.3s ease; }

        /* Glass Cards */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
        }

        /* Hardcore Warning */
        .hardcore-warning {
            background: rgba(255, 0, 85, 0.1);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 15px;
            text-align: center;
            border: 1px solid rgba(255, 0, 85, 0.3);
            font-size: 12px;
            color: #ff99aa;
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { border-color: rgba(255,0,85,0.3); }
            50% { border-color: rgba(255,0,85,0.8); }
            100% { border-color: rgba(255,0,85,0.3); }
        }

        /* UI Elements */
        .btn {
            background: linear-gradient(135deg, var(--primary), #00A8FF);
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:active { transform: scale(0.95); }

        .option-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 16px;
            margin-bottom: 10px;
            border-radius: 12px;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-btn.correct { background: var(--success); color: #000; border-color: var(--success); }
        .option-btn.wrong { background: var(--danger); border-color: var(--danger); animation: shake 0.3s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        input[type="text"] {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-size: 18px;
            text-align: center;
            margin-bottom: 20px;
        }

        /* Intro/Story Layout */
        #screen-intro { justify-content: center; }
        .logo-area { text-align: center; margin-bottom: 40px; }
        .logo-title { font-size: 42px; font-weight: 800; letter-spacing: -1px; background: linear-gradient(to bottom, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-sub { font-size: 14px; letter-spacing: 5px; color: var(--secondary); margin-top: -5px; }

        /* Story Card Layout */
        .story-container {
            margin-top: auto;
            margin-bottom: 20px;
        }
        .dogi-talk {
            font-size: 18px;
            line-height: 1.6;
            margin-top: 10px;
        }

        /* Restart Notification */
        #restart-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            display: none;
            flex-direction: column; width: 100%;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
        }
        #restart-overlay h2 { font-size: 32px; margin-bottom: 10px; color: #fff; text-shadow: 0 0 20px #000; }

        /* Ending Screen */
        .ending-stats {
            margin: 20px 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .stat-box {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }
        .stat-box .v { font-size: 24px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>
    <div id="app">
        <!-- HUD -->
        <div id="hud-top">
            <div class="hud-item">
                <span class="hud-label">Time</span>
                <span id="hud-timer" class="hud-val">00:00</span>
            </div>
            <div id="progress-container">
                <div id="hud-progress-bar"></div>
            </div>
            <div class="hud-item">
                <span class="hud-label">Progress</span>
                <span class="hud-val"><span id="progress-val">0</span>%</span>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="screen-intro" class="screen active" style="background-image: url('assets/intro_bg.webp');">
            <div class="logo-area">
                <h1 class="logo-title">DOGI</h1>
                <p class="logo-sub">SOLAR WIND DEFENSE</p>
            </div>
            <div class="glass-card">
                <input type="text" id="nickname-input" placeholder="도기 탐정의 이름(닉네임)" maxlength="10">
                <button class="btn" onclick="Game.initGame()">프로젝트 가동</button>
                <p style="text-align: center; font-size: 12px; opacity: 0.6; margin-top: 15px;">※ 주의: 오답 시 처음부터 다시 시작합니다.</p>
            </div>
        </div>

        <!-- Story/Narrative Card Screen -->
        <div id="screen-story" class="screen">
            <div class="story-container">
                <div class="glass-card">
                    <div id="story-label" style="font-size: 12px; color: var(--secondary); font-weight: bold; margin-bottom: 5px;">STORY LOG</div>
                    <div id="story-text" class="dogi-talk">...</div>
                    <button id="story-next-btn" class="btn">계속하기</button>
                </div>
            </div>
        </div>

        <!-- Mission/Quiz Screen -->
        <div id="screen-mission" class="screen">
            <div class="hardcore-warning">⚠ 경고: 오답 시 시스템 리셋 - 처음부터 다시 시도해야 합니다.</div>
            <div class="glass-card" style="margin-bottom: auto;">
                <div id="mission-log" style="font-size: 13px; color: var(--primary); font-weight: bold; margin-bottom: 10px;">MISSION LOG</div>
                <div id="mission-q" style="font-size: 18px; font-weight: bold; line-height: 1.4;">...</div>
            </div>
            <div id="choice-area" style="display: none; margin-top: 20px;"></div>
            <div id="text-area" style="display: none; margin-top: 20px; flex-direction: column;">
                <input type="text" id="mission-input" placeholder="정답을 입력하세요">
                <button class="btn" onclick="Game.checkTextAnswer()">데이터 송신</button>
            </div>
            <button class="btn" onclick="Game.showHint()" style="background: var(--glass-bg); color: #fff; margin-top: 10px; border: 1px solid var(--glass-border); font-size: 14px; box-shadow: none;">도움말(힌트)</button>
        </div>

        <!-- Ending Screen -->
        <div id="screen-ending" class="screen">
            <div class="glass-card" style="margin-top: 100px; text-align: center;">
                <h2 style="font-size: 32px; color: var(--secondary); margin-bottom: 10px;">지구 수호 완료!</h2>
                <p><span id="res-nick" style="color:var(--primary); font-weight: bold;"></span> 탐정님, 수고하셨습니다.</p>
                <div class="ending-stats">
                    <div class="stat-box">
                        <div class="hud-label">소요 시간</div>
                        <div id="res-time" class="v">00:00</div>
                    </div>
                    <div class="stat-box">
                        <div class="hud-label">힌트 사용</div>
                        <div id="res-hints" class="v">0</div>
                    </div>
                    <div class="stat-box" style="grid-column: span 2;">
                        <div class="hud-label">총 시도 횟수</div>
                        <div id="res-attempts" class="v">0</div>
                    </div>
                </div>
                <button class="btn" onclick="location.reload()">새로운 임무 시작</button>
            </div>
        </div>

        <!-- Restart Overlay -->
        <div id="restart-overlay">
            <div style="font-size: 80px;">❌</div>
            <h2>시스템 오류 발생</h2>
            <p>보안 규정에 따라 처음부터 다시 시작합니다.</p>
            <div id="restart-countdown" style="font-size: 40px; font-weight: bold; margin-top: 20px; color: var(--secondary);">3</div>
        </div>

        <!-- Hint Modal -->
        <div id="modal-hint" style="position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; z-index:200;">
            <div class="glass-card" style="margin: 30px;">
                <h3 style="margin-bottom: 15px; color: var(--secondary);">🔍 도기 탐정의 힌트</h3>
                <p id="hint-text" style="line-height: 1.6;">...</p>
                <button class="btn" onclick="Game.closeModal()">확인</button>
            </div>
        </div>
    </div>

                            id: 10, type: "text", q: "별이 에너지를 만드는 가장 안정적인 '황금기' 단계는?", ans: "주계열",
                            hint: "별의 일생 전시물을 확인해. 'ㅈ계열'",
                            narrationBefore: "태양풍을 막을 수 있는 유일한 에너지는 별이 가장 밝고 안정적으로 타오르는 이 시기의 에너지야!",
                            narrationSolved: "방어막 가동 성공! 태양풍을 막아냈어. 우리가 지구를 지켰어!",
                            imgBefore: "assets/stage3_m10_before.webp", imgSolving: "assets/stage3_m10_solving.webp", imgSolved: "assets/stage3_m10_solved.webp",
                            log: "최종 오메가 베리어 가동"
                        }
                    ]
                }
            ]
        };

        const Game = {
            state: { nick: "", stage: 0, mission: 0, subStep: "before", startTime: 0, hints: 0, attempts: 1 },
            timer: null,

            init() {
                const saved = localStorage.getItem('Dogi_save_hardcore');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        if(confirm(`${data.nick} 탐정님, 이전 기록이 있습니다. 이어하시겠습니까?`)) {
                            this.state = data;
                            this.resumeGame();
                            return;
                        }
                    } catch(e) { localStorage.removeItem('Dogi_save_hardcore'); }
                }
            },

            initGame() {
                const val = document.getElementById('nickname-input').value.trim();
                if(!val) return alert("도기 탐정의 이름을 입력해주세요!");
                this.state.nick = val;
                this.state.startTime = Date.now();
                this.state.stage = 0; this.state.mission = 0; this.state.subStep = "before";
                this.save(); this.showHUD(); this.startTimer(); this.render();
            },

            resumeGame() { this.showHUD(); this.startTimer(); this.render(); },
            showHUD() { document.getElementById('hud-top').style.display = 'flex'; },

            render() {
                const s = DATABASE.stages[this.state.stage];
                const m = s.missions[this.state.mission];
                if(this.state.subStep === "before") {
                    this.renderStory(m.narrationBefore, m.imgBefore, () => {
                        this.state.subStep = "solving"; this.save(); this.render();
                    });
                } else if(this.state.subStep === "solving") {
                    this.renderQuiz(m);
                } else if(this.state.subStep === "solved") {
                    this.renderStory(m.narrationSolved, m.imgSolved, () => { this.next(); });
                }
            },

            renderStory(text, bg, callback) {
                const screen = document.getElementById('screen-story');
                screen.style.backgroundImage = `url(${bg})`;
                document.getElementById('story-text').innerText = text;
                document.getElementById('story-next-btn').onclick = callback;
                this.showScreen('screen-story');
            },

            renderQuiz(m) {
                const screen = document.getElementById('screen-mission');
                screen.style.backgroundImage = `url(${m.imgSolving})`;
                document.getElementById('mission-log').innerText = m.log;
                document.getElementById('mission-q').innerText = m.q;
                const cArea = document.getElementById('choice-area');
                const tArea = document.getElementById('text-area');
                if(m.type === "choice") {
                    cArea.style.display = "grid"; tArea.style.display = "none"; cArea.innerHTML = "";
                    m.opts.forEach((o, i) => {
                        const b = document.createElement('button');
                        b.className = "option-btn"; b.innerText = `${i+1}. ${o}`;
                        b.onclick = () => this.handleAnswer(i === m.ans, b);
                        cArea.appendChild(b);
                    });
                } else {
                    cArea.style.display = "none"; tArea.style.display = "flex";
                    document.getElementById('mission-input').value = "";
                }
                this.updateProgress(); this.save(); this.showScreen('screen-mission');
            },

            handleAnswer(isCorrect, btn) {
                if(isCorrect) {
                    if(btn) btn.classList.add('correct');
                    setTimeout(() => { this.state.subStep = "solved"; this.save(); this.render(); }, 600);
                } else {
                    if(btn) btn.classList.add('wrong');
                    this.triggerHardcoreReset();
                }
            },

            checkTextAnswer() {
                const input = document.getElementById('mission-input');
                const m = DATABASE.stages[this.state.stage].missions[this.state.mission];
                const val = input.value.trim().replace(/\s/g, "").toLowerCase();
                const target = m.ans.replace(/\s/g, "").toLowerCase();
                if(val === target) {
                    input.style.borderColor = "#00E676"; this.handleAnswer(true);
                } else {
                    input.style.borderColor = "#FF4B2B"; this.triggerHardcoreReset();
                }
            },

            triggerHardcoreReset() {
                const overlay = document.getElementById('restart-overlay');
                overlay.style.display = 'flex';
                let count = 3;
                document.getElementById('restart-countdown').innerText = count;
                const timer = setInterval(() => {
                    count--;
                    document.getElementById('restart-countdown').innerText = count;
                    if(count <= 0) { clearInterval(timer); overlay.style.display = 'none'; this.resetToStart(); }
                }, 1000);
            },

            resetToStart() {
                this.state.stage = 0; this.state.mission = 0; this.state.subStep = "before";
                this.state.attempts++; this.save(); this.render();
            },

            next() {
                const s = DATABASE.stages[this.state.stage];
                this.state.mission++; this.state.subStep = "before";
                if(this.state.mission >= s.missions.length) {
                    this.state.stage++; this.state.mission = 0;
                    if(this.state.stage >= DATABASE.stages.length) return this.end();
                }
                this.save(); this.render();
            },

            showScreen(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(id).classList.add('active');
            },

            startTimer() {
                if(this.timer) clearInterval(this.timer);
                this.timer = setInterval(() => {
                    const diff = Date.now() - this.state.startTime;
                    const min = Math.floor(diff / 60000);
                    const sec = Math.floor((diff % 60000) / 1000);
                    document.getElementById('hud-timer').innerText = `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
                }, 1000);
            },

            showHint() {
                const m = DATABASE.stages[this.state.stage].missions[this.state.mission];
                document.getElementById('hint-text').innerText = m.hint;
                document.getElementById('modal-hint').style.display = "flex";
                this.state.hints++; this.save();
            },

            closeModal() { document.getElementById('modal-hint').style.display = "none"; },

            updateProgress() {
                const totalMissions = 10;
                let done = 0;
                for(let i=0; i<this.state.stage; i++) done += DATABASE.stages[i].missions.length;
                done += this.state.mission;
                const pct = Math.floor((done / totalMissions) * 100);
                document.getElementById('progress-val').innerText = pct;
                document.getElementById('hud-progress-bar').style.width = pct + "%";
            },

            save() { localStorage.setItem('Dogi_save_hardcore', JSON.stringify(this.state)); },

            end() {
                clearInterval(this.timer); localStorage.removeItem('Dogi_save_hardcore');
                document.getElementById('hud-top').style.display = "none";
                const diff = Date.now() - this.state.startTime;
                const min = Math.floor(diff / 60000); const sec = Math.floor((diff % 60000) / 1000);
                document.getElementById('res-nick').innerText = this.state.nick;
                document.getElementById('res-time').innerText = `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
                document.getElementById('res-hints').innerText = this.state.hints;
                document.getElementById('res-attempts').innerText = this.state.attempts;
                this.showScreen('screen-ending');
            }
        };

        window.onload = () => Game.init();
    </script>
</body>
</html>
