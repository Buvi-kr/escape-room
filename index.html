<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>도기탐정: 태양풍 방어</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    /* ── TOKENS ─────────────────────────────────── */
    :root {
      --bg:       #060616;
      --primary:  #00F2FE;
      --gold:     #FFD700;
      --accent:   #FF0055;
      --danger:   #FF4B2B;
      --success:  #00E676;
      --glass:    rgba(255,255,255,0.07);
      --gborder:  rgba(255,255,255,0.13);
      --ghover:   rgba(255,255,255,0.16);
      --blur:     blur(18px);
      --r-sm:     12px;
      --r-md:     18px;
      --r-lg:     24px;
      --ease:     cubic-bezier(0.4,0,0.2,1);
    }

    /* ── RESET ───────────────────────────────────── */
    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: #fff;
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      position: fixed;
    }

    /* ── APP SHELL ───────────────────────────────── */
    #app {
      position: relative;
      width: 100%; height: 100%;
      max-width: 480px;
      margin: 0 auto;
      overflow: hidden;
      background: var(--bg);
      box-shadow: 0 0 80px rgba(0,0,0,0.9);
    }

    /* ── STARFIELD ───────────────────────────────── */
    #starfield {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ── FULL BACKGROUND (Intro & Ending only) ──── */
    #full-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      z-index: 1;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s var(--ease);
    }
    #full-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top,
        rgba(6,6,22,1) 0%,
        rgba(6,6,22,0.5) 40%,
        rgba(6,6,22,0.15) 100%);
    }

    /* ── SCREEN SYSTEM ───────────────────────────── */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      z-index: 5;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s var(--ease);
    }
    .screen.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── HUD ─────────────────────────────────────── */
    #hud {
      position: absolute;
      top: 12px; left: 12px; right: 12px;
      height: 48px;
      display: none;
      align-items: center;
      z-index: 50;
      background: rgba(6,6,22,0.8);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--gborder);
      border-radius: var(--r-md);
      padding: 0 14px;
      gap: 10px;
    }
    .hud-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 50px;
    }
    .hud-label {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: .14em;
      color: var(--primary);
      text-transform: uppercase;
    }
    .hud-val {
      font-size: 15px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }
    #hud-bar-wrap {
      flex: 1;
      height: 5px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
    }
    #hud-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary), var(--gold));
      border-radius: 3px;
      transition: width .6s var(--ease);
    }

    /* ── GLASS CARD ──────────────────────────────── */
    .glass {
      background: rgba(6,6,22,0.75);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--gborder);
      border-radius: var(--r-lg);
      padding: 24px;
    }

    /* ── BUTTONS ─────────────────────────────────── */
    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: var(--r-sm);
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: transform .15s var(--ease), box-shadow .2s var(--ease);
      position: relative;
      overflow: hidden;
      -webkit-appearance: none;
    }
    .btn:active { transform: scale(0.96); }
    .btn + .btn { margin-top: 10px; }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #007AFF);
      color: #000;
      box-shadow: 0 4px 20px rgba(0,242,254,.2);
    }
    .btn-primary:active { box-shadow: 0 2px 10px rgba(0,242,254,.3); }

    .btn-ghost {
      background: rgba(255,255,255,0.06);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--gborder);
      color: rgba(255,255,255,.65);
      font-size: 14px;
      font-weight: 600;
    }
    .btn-cancel {
      background: rgba(255,255,255,.08);
      border: 1px solid var(--gborder);
      color: rgba(255,255,255,.6);
    }

    /* ── INPUTS ──────────────────────────────────── */
    .field {
      width: 100%;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--gborder);
      border-radius: var(--r-sm);
      padding: 15px 18px;
      color: #fff;
      font-size: 17px;
      font-family: inherit;
      text-align: center;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      margin-bottom: 12px;
      -webkit-appearance: none;
    }
    .field:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,242,254,.12);
    }
    .field.ok  { border-color: var(--success); }
    .field.bad { border-color: var(--danger); animation: shake .35s; }

    /* ── INTRO ───────────────────────────────────── */
    #screen-intro {
      justify-content: space-between;
      padding: 56px 24px 40px;
      z-index: 10;
    }
    .intro-hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 10px;
    }
    .badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .22em;
      color: var(--gold);
      background: rgba(255,215,0,.1);
      border: 1px solid rgba(255,215,0,.3);
      padding: 5px 16px;
      border-radius: 20px;
    }
    .logo-title {
      font-size: 58px;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
      background: linear-gradient(170deg,#fff 20%,var(--primary) 90%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-sub {
      font-size: 12px;
      letter-spacing: .42em;
      color: var(--primary);
      opacity: .75;
    }
    .intro-desc {
      font-size: 13px;
      color: rgba(255,255,255,.45);
      line-height: 1.65;
      margin-top: 8px;
    }

    /* ─────────────────────────────────────────────
       HYBRID LAYOUT  (Story & Mission screens)
       ──────────────────────────────────────────── */
    .split-layout {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      padding-top: 62px; /* HUD clearance */
    }

    .monitor-area {
      flex: 0 0 38%;
      padding: 4px 18px 8px;
      display: flex;
    }
    .monitor-box {
      width: 100%;
      border-radius: var(--r-md);
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.12);
      background-size: cover;
      background-position: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      transition: background-image 0.4s var(--ease),
                  box-shadow 0.4s var(--ease),
                  border-color 0.4s var(--ease);
      position: relative;
      overflow: hidden;
    }
    /* scan-line effect on monitor */
    .monitor-box::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      border-radius: inherit;
    }

    .control-area {
      flex: 1;
      min-height: 0;
      padding: 6px 18px 20px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .control-area::-webkit-scrollbar { display: none; }

    /* ── STORY ───────────────────────────────────── */
    #screen-story { cursor: pointer; }
    #screen-story .control-area {
      overflow-y: hidden; /* flex 자식 확장 버그 방지 */
    }

    .story-stage {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .22em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 8px;
      text-align: center;
    }
    .char-card {
      background: rgba(6,6,22,0.8);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--gborder);
      border-radius: var(--r-lg);
      padding: 18px 20px 22px;
      position: relative;
      margin-top: 0;
      display: flex;
      flex-direction: column;
    }
    .char-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: .06em;
      margin-bottom: 8px;
    }
    #story-text {
      font-size: 20px;
      line-height: 1.7;
    }
    .tap-cue {
      display: block;
      text-align: right;
      margin-top: 16px;
      padding-top: 4px;
      font-size: 20px;
      color: rgba(255,255,255,.35);
      letter-spacing: .04em;
      animation: blink 1.7s infinite;
    }

    /* ── MISSION ─────────────────────────────────── */
    .mission-hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .m-badge {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .1em;
      background: var(--primary);
      color: #000;
      padding: 4px 10px;
      border-radius: 6px;
      white-space: nowrap;
    }
    .m-title {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,.55);
      letter-spacing: .04em;
    }
    .hc-strip {
      background: rgba(255,0,85,.08);
      border: 1px solid rgba(255,0,85,.25);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 11px;
      color: #ff99bb;
      text-align: center;
      animation: pulse-red 2.2s infinite;
      margin-bottom: 8px;
    }
    .q-card {
      background: rgba(6,6,22,0.8);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--gborder);
      border-radius: var(--r-md);
      padding: 16px 18px;
      margin-bottom: 6px;
    }
    #mission-q {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    /* choices */
    #choice-area {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 8px;
    }
    .opt {
      background: rgba(6,6,22,0.65);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--gborder);
      color: #fff;
      padding: 14px 16px;
      border-radius: var(--r-sm);
      text-align: left;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      transition: background .2s, border-color .2s, transform .12s;
      display: flex;
      align-items: center;
      gap: 12px;
      -webkit-appearance: none;
    }
    .opt:active { transform: scale(0.98); }
    .opt-n { font-size: 11px; font-weight: 800; color: var(--primary); min-width: 18px; }
    .opt.correct {
      background: rgba(0,230,118,.18);
      border-color: var(--success);
      color: var(--success);
    }
    .opt.wrong {
      background: rgba(255,75,43,.18);
      border-color: var(--danger);
      animation: shake .35s;
    }

    /* text input area */
    #text-area { display: none; flex-direction: column; margin-bottom: 8px; }

    /* guide text (replaces hint button) */
    .guide-text {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 10px 14px;
      background: rgba(255,215,0,0.06);
      border: 1px solid rgba(255,215,0,0.15);
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.6;
      color: rgba(255,255,255,0.6);
      margin-bottom: 10px;
    }
    .guide-text .guide-icon {
      flex-shrink: 0;
      font-size: 14px;
      margin-top: 1px;
    }


    .mission-actions { display: flex; flex-direction: column; gap: 8px; margin-top: auto; }

    /* ── ENDING ──────────────────────────────────── */
    #screen-ending {
      justify-content: center;
      align-items: center;
      padding: 32px 24px;
      gap: 14px;
      z-index: 10;
    }
    .end-eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .3em;
      color: var(--gold);
      text-align: center;
      text-transform: uppercase;
    }
    .grade-ring {
      width: 116px;
      height: 116px;
      border-radius: 50%;
      border: 3px solid var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 40px rgba(0,242,254,.25),
                  inset 0 0 40px rgba(0,242,254,.05);
      transition: border-color .4s, box-shadow .4s;
    }
    .grade-letter {
      font-size: 60px;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg,#fff,var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .end-mascot {
      width: 180px;
      height: 180px;
      object-fit: contain;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
      margin: 10px 0;
    }
    .end-title {
      font-size: 26px;
      font-weight: 800;
      text-align: center;
    }
    .end-sub {
      font-size: 14px;
      color: rgba(255,255,255,.55);
      text-align: center;
    }
    
    /* ── CERTIFICATE CARD ────────────────────────── */
    /* ── CERTIFICATE CARD (PREMIUM UPGRADE) ──────────────── */
    .cert-card-premium {
      background: #fff;
      border: 10px solid var(--gold);
      border-radius: 32px;
      padding: 24px 20px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: #333;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      position: relative;
    }
    .cert-logo-wrap { width: 100%; display: flex; justify-content: center; margin-bottom: 2px; }
    .cert-logo { width: 140px; height: auto; }
    
    .cert-badge-premium {
      background: #a67c00;
      color: #fff;
      padding: 6px 20px;
      border-radius: 6px;
      font-weight: 800;
      font-size: 1.05rem;
      margin: 8px 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    
    .cert-nick-wrap { text-align: center; margin-bottom: 5px; }
    .cert-nick { font-size: 2.4rem; font-weight: 800; color: #000; line-height: 1.1; margin-bottom: 4px; }
    .cert-sub { font-size: 13px; color: #666; font-weight: 600; }
    
    .cert-stats-row { display: flex; gap: 10px; width: 100%; margin: 8px 0; }
    .c-stat-box {
      flex: 1; background: #f4f7f9; border-radius: 14px; padding: 10px; text-align: center;
      display: flex; flex-direction: column; gap: 2px;
    }
    .c-stat-lbl { font-size: 9px; color: #99a; font-weight: 700; text-transform: uppercase; }
    .c-stat-val { font-size: 17px; font-weight: 800; color: #2c3e50; }
    
    .cert-msg { 
      font-size: 14px; color: #444; text-align: center; line-height: 1.5; 
      font-weight: 600; margin: 5px 0; padding: 0 10px; word-break: keep-all;
    }
    
    .end-mascot-cert {
      width: 130px; height: 130px; object-fit: contain; margin-top: 5px;
    }
    
    .cert-date { font-size: 12px; color: #bbb; font-weight: 600; margin-top: 5px; font-family: 'Outfit'; }


    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
    }
    .stat-box {
      background: var(--glass);
      border: 1px solid var(--gborder);
      border-radius: var(--r-md);
      padding: 14px;
      text-align: center;
    }
    .stat-box.wide { grid-column: span 2; }
    .stat-lbl {
      font-size: 9px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .stat-val {
      font-size: 22px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    /* ── OVERLAYS ────────────────────────────────── */
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 28px;
    }
    .overlay.open { display: flex; }

    /* restart */
    #ov-restart {
      background: rgba(200,0,0,.3);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      flex-direction: column;
      text-align: center;
      gap: 10px;
    }
    #ov-restart .icon  { font-size: 68px; }
    #ov-restart .title { font-size: 26px; font-weight: 800; }
    #ov-restart .sub   { font-size: 13px; color: rgba(255,255,255,.65); }
    #restart-count     { font-size: 52px; font-weight: 800; color: var(--gold); }

    /* confirm */
    #ov-confirm {
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .confirm-card {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .confirm-eyebrow {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: .1em;
      text-align: center;
    }
    .confirm-q {
      font-size: 14px;
      color: rgba(255,255,255,.65);
      text-align: center;
    }
    .confirm-ans {
      font-size: 21px;
      font-weight: 700;
      color: var(--primary);
      text-align: center;
      background: rgba(0,242,254,.07);
      border: 1px solid rgba(0,242,254,.2);
      border-radius: var(--r-sm);
      padding: 14px;
    }
    .confirm-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* hint */
    #ov-hint {
      background: rgba(0,0,0,.78);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .hint-card {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .hint-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--gold);
    }
    #hint-text {
      font-size: 15px;
      line-height: 1.7;
      color: rgba(255,255,255,.82);
    }

    /* ── KEYFRAMES ───────────────────────────────── */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-7px); }
      40%     { transform: translateX(7px); }
      60%     { transform: translateX(-4px); }
      80%     { transform: translateX(4px); }
    }
    @keyframes blink {
      0%,100% { opacity: .3; }
      50%     { opacity: 1; }
    }
    @keyframes pulse-red {
      0%,100% { border-color: rgba(255,0,85,.2); }
      50%     { border-color: rgba(255,0,85,.55); }
    }
    @keyframes pop-in {
      0%   { transform: scale(.82); opacity: 0; }
      60%  { transform: scale(1.04); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes ripple {
      to { transform: scale(5); opacity: 0; }
    }
    @keyframes glow-pulse {
      0%,100% { opacity: 0.6; }
      50%     { opacity: 1; }
    }
    .pop { animation: pop-in .3s var(--ease) forwards; }
  </style>
</head>
<body>
<div id="app">

  <!-- Starfield canvas -->
  <canvas id="starfield"></canvas>

  <!-- Fullscreen BG (Intro & Ending) -->
  <div id="full-bg"></div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-col">
      <span class="hud-label">TIME</span>
      <span class="hud-val" id="hud-timer">00:00</span>
    </div>
    <div id="hud-bar-wrap"><div id="hud-bar"></div></div>
    <div class="hud-col">
      <span class="hud-label">진행</span>
      <span class="hud-val"><span id="hud-pct">0</span>%</span>
    </div>
  </div>

  <!-- ════════ INTRO ════════ -->
  <div id="screen-intro" class="screen">

/* ═══════════════════════════════════════════════
   STARFIELD
═══════════════════════════════════════════════ */
const Starfield = (() => {
  let cvs, ctx, stars=[], raf;
  const COUNT = 120;

  function resize(){
    const r = window.devicePixelRatio || 1;
    cvs.width  = cvs.clientWidth * r;
    cvs.height = cvs.clientHeight * r;
    ctx.scale(r, r);
  }
  function seed(){
    stars = Array.from({length:COUNT},()=>({
      x: Math.random(),
      y: Math.random(),
      r: Math.random()*1.2+0.2,
      speed: Math.random()*0.00012+0.00002,
      a: Math.random()*0.5+0.25,
      phase: Math.random()*Math.PI*2
    }));
  }
  function draw(){
    const W = cvs.clientWidth, H = cvs.clientHeight;
    const t = Date.now()*0.001;
    ctx.clearRect(0, 0, cvs.width, cvs.height);
    for(const s of stars){
      s.y += s.speed;
      if(s.y>1){s.y=0; s.x=Math.random();}
      const a = s.a*(0.6+0.4*Math.sin(t*1.1+s.phase));
      ctx.beginPath();
      ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${a.toFixed(2)})`;
      ctx.fill();
    }
    raf = requestAnimationFrame(draw);
  }
  return {
    init(){
      cvs = document.getElementById('starfield');
      ctx = cvs.getContext('2d');
      seed();
      // Wait for layout to stabilize before measuring
      requestAnimationFrame(()=>{ resize(); draw(); });
      window.addEventListener('resize', resize);
    }
  };
})();

/* ═══════════════════════════════════════════════
   AUDIO  (Web Audio — zero external files)
═══════════════════════════════════════════════ */
const Sfx = (() => {
  let ac;
  function getCtx(){
    if(!ac) ac = new(window.AudioContext||window.webkitAudioContext)();
    if(ac.state === 'suspended') ac.resume();
    return ac;
  }
  function tone(f,type,dur,vol=0.22){
    try{
      const a=getCtx(), o=a.createOscillator(), g=a.createGain();
      o.connect(g); g.connect(a.destination);
      o.type=type; o.frequency.value=f;
      g.gain.setValueAtTime(vol,a.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
      o.start(); o.stop(a.currentTime+dur);
    }catch(e){}
  }
  return {
    tap()    { tone(900,'sine',.06,.1); },
    correct(){ tone(523,'sine',.1,.2); setTimeout(()=>tone(784,'sine',.18,.2),110); },
    wrong()  { tone(160,'sawtooth',.28,.28); },
    fanfare(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.15,.18),i*110)); }
  };
})();

const STAGE_COLORS = [
  {glow:'rgba(0,242,254,0.35)',  border:'rgba(0,242,254,0.5)',   fallback:'linear-gradient(135deg,#06062a 0%,#0d1a3a 100%)'},
  {glow:'rgba(255,120,50,0.35)', border:'rgba(255,120,50,0.5)',  fallback:'linear-gradient(135deg,#1a0e06 0%,#06062a 100%)'},
  {glow:'rgba(155,89,182,0.35)', border:'rgba(155,89,182,0.5)',  fallback:'linear-gradient(135deg,#0e0620 0%,#06062a 100%)'},
  {glow:'rgba(255,215,0,0.35)',  border:'rgba(255,215,0,0.5)',   fallback:'linear-gradient(135deg,#1a1406 0%,#06062a 100%)'},
];

function setBg(el, url, si){
  if(!el) return;
  const sc = STAGE_COLORS[si] || STAGE_COLORS[0];
  if(!url){ el.style.backgroundImage = sc.fallback; return; }
  // Set immediately to trigger CSS background-image transition without waiting for onload
  el.style.backgroundImage = `url(${url})`;
}

function setMonitorGlow(el, si){
  if(!el) return;
  const sc = STAGE_COLORS[si] || STAGE_COLORS[0];
  el.style.boxShadow = `0 4px 24px ${sc.glow}, inset 0 0 20px rgba(0,0,0,0.3)`;
  el.style.borderColor = sc.border;
}

/* ═══════════════════════════════════════════════
   TYPEWRITER
═══════════════════════════════════════════════ */
function typewrite(el, text, speed, doneCb){
  speed = speed || 28;
  el.textContent = '';
  let i = 0, cancelled = false;
  (function step(){
    if(cancelled) return;
    if(i < text.length){
      el.textContent += text[i++];
      setTimeout(step, speed);
    } else {
      if(doneCb) doneCb();
    }
  })();
  return ()=>{ cancelled = true; };
}

const UI = {
  show(id){
    const screens = document.querySelectorAll('.screen');
    const old = document.querySelector('.screen.active');
    const next = document.getElementById(id);
    if(old === next) return;

    // baseline z-index
    screens.forEach(s => s.style.zIndex = '5');
    
    // new screen on top
    next.style.zIndex = '6';
    next.classList.add('active');

    // Full-bg only for intro & ending
    const fbg = document.getElementById('full-bg');
    if(fbg) fbg.style.opacity = (id==='screen-intro' || id==='screen-ending') ? '1' : '0';

    if(old) {
      // Keep old screen until new one is fully visible to avoid black flash
      setTimeout(() => {
        if (old !== next) {
          old.classList.remove('active');
          old.style.zIndex = '5';
        }
      }, 400); 
    }
  },
  openOv(id) { document.getElementById(id).classList.add('open'); },
  closeOv(id){ document.getElementById(id).classList.remove('open'); },
  showHUD()  { document.getElementById('hud').style.display='flex'; },
  hideHUD()  { document.getElementById('hud').style.display='none'; },
  setProgress(done,total){
    const pct = Math.floor(done/total*100);
    document.getElementById('hud-bar').style.width = pct+'%';
    document.getElementById('hud-pct').textContent = pct;
  }
};

/* ═══════════════════════════════════════════════
   GAME
═══════════════════════════════════════════════ */
const Game = (()=>{
  const KEY   = 'doggy_v3';
  const TOTAL = 10;
  let S, tick, pending;

  /* helpers */
  const ms = ()=>DB.stages[S.si].missions[S.mi];
  const save = ()=>localStorage.setItem(KEY,JSON.stringify(S));
  const nuke = ()=>localStorage.removeItem(KEY);
  function elapsed(){ return Date.now()-S.t0; }
  function fmtTime(v){
    const m=Math.floor(v/60000), s=Math.floor((v%60000)/1000);
    return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  }
  function totalDone(){
    let n=0;
    for(let i=0;i<S.si;i++) n+=DB.stages[i].missions.length;
    return n+S.mi;
  }

  /* timer */
  function startTick(){
    if(tick) clearInterval(tick);
    tick=setInterval(()=>{
      document.getElementById('hud-timer').textContent=fmtTime(elapsed());
    },1000);
  }

  /* ── story ── */
  function showStory(text, img, cb){
    const monitor = document.getElementById('story-monitor');
    setBg(monitor, img, S.si);
    setMonitorGlow(monitor, S.si);
    document.getElementById('story-stage').textContent = DB.stages[S.si].name;

    // 대사 및 캐릭터 이름에 닉네임 반영
    let finalMsg = text;
    if (S && S.nick) {
      finalMsg = finalMsg.replace(/도기 탐정/g, S.nick + " 탐정");
      const charNameEl = document.querySelector('.char-name');
      if (charNameEl) {
        charNameEl.innerHTML = `🔭 &nbsp;<span style="color:var(--gold); font-weight:900; font-size:1.15em;">${S.nick}</span> 탐정`;
      }
    }

    const el = document.getElementById('story-text');
    let done = false;
    let cancelType = null;

    function proceed(){
      if(!done){
        if(cancelType) cancelType();
        el.textContent = finalMsg;
        done = true;
      } else {
        cb();
      }
    }

    const layout = document.getElementById('story-layout');
    layout.onclick = proceed;

    // Start typewriter with a small delay so user sees the image change first
    setTimeout(() => {
      cancelType = typewrite(el, finalMsg, 28, ()=>{ done = true; });
    }, 150);

    UI.show('screen-story');
    Sfx.tap();
  }

  /* ── quiz ── */
  function showQuiz(mission){
    const monitor = document.getElementById('mission-monitor');
    /* System HUD fallback or image */
    monitor.innerHTML = '';
    setBg(monitor, mission.imgSolving, S.si);
    setMonitorGlow(monitor, S.si);

    document.getElementById('m-badge').textContent = 'M'+String(mission.id).padStart(2,'0');
    document.getElementById('m-title').textContent = mission.log;
    document.getElementById('mission-q').textContent = mission.q;
    document.getElementById('guide-msg').textContent = mission.guide;

    const ca  = document.getElementById('choice-area');
    const ta  = document.getElementById('text-area');
    const sub = document.getElementById('btn-submit');
    const inp = document.getElementById('m-input');

    if(mission.type === 'choice'){
      ca.style.display = 'flex';
      ta.style.display = 'none';
      sub.style.display = 'none';
      ca.innerHTML = '';
      delete ca.dataset.locked;

      mission.opts.forEach((opt, i) => {
        const b = document.createElement('button');
        b.className = 'opt';
        b.innerHTML = `<span class="opt-n">${i+1}</span><span>${opt}</span>`;
        b.addEventListener('click', () => {
          if(ca.dataset.locked) return;
          ca.dataset.locked = '1';
          Sfx.tap();
          confirm_(opt, ()=>resolve(i===mission.ans, b), ()=>{ delete ca.dataset.locked; });
        });
        ca.appendChild(b);
      });
    } else {
      ca.style.display = 'none';
      ta.style.display = 'flex';
      sub.style.display = 'block';
      inp.value = '';
      inp.className = 'field';

      const doSubmit = () => {
        const v = inp.value.trim();
        if(!v) return;
        Sfx.tap();
        confirm_(v, ()=>{
          const ok = v.replace(/\s/g,'').toLowerCase() === mission.ans.replace(/\s/g,'').toLowerCase();
          inp.className = 'field ' + (ok ? 'ok' : 'bad');
          resolve(ok);
        }, ()=>{});
      };

      sub.onclick = doSubmit;
      inp.onkeydown = e => { if(e.key === 'Enter') doSubmit(); };
    }

    UI.setProgress(totalDone(), TOTAL);
    save();

    // Small delay before showing screen to let image transition start
    setTimeout(() => {
      UI.show('screen-mission');
    }, 50);
  }

  /* ── confirm overlay ── */
  function confirm_(ansText, onOk, onCancel){
    // Dismiss mobile keyboard
    if(document.activeElement && document.activeElement.blur) document.activeElement.blur();
    document.getElementById('confirm-ans').textContent = ansText;
    UI.openOv('ov-confirm');
    pending = {onOk, onCancel};
  }

  /* ── resolve answer ── */
  function resolve(correct, btn){
    UI.closeOv('ov-confirm');
    if(correct){
      if(btn) btn.classList.add('correct');
      Sfx.correct();
      setTimeout(()=>{ S.step='solved'; save(); render(); }, 700);
    } else {
      if(btn) btn.classList.add('wrong');
      Sfx.wrong();
      hardcoreReset();
    }
  }

  /* ── hardcore reset ── */
  function hardcoreReset(){
    UI.openOv('ov-restart');
    let n = 3;
    document.getElementById('restart-count').textContent = n;
    const t = setInterval(()=>{
      document.getElementById('restart-count').textContent = --n;
      if(n <= 0){
        clearInterval(t);
        UI.closeOv('ov-restart');
        S.mi = 0; S.step = 'before'; S.attempts++;
        UI.setProgress(totalDone(), TOTAL);
        save();
        render();
      }
    }, 1000);
  }

  /* ── advance ── */
  function advance(){
    S.mi++;
    S.step = 'before';
    if(S.mi >= DB.stages[S.si].missions.length){
      S.si++;
      S.mi = 0;
      if(S.si >= DB.stages.length){ end(); return; }
      Sfx.fanfare();
    }
    save();
    render();
  }

  /* ── render ── */
  function render(){
    if(S.step === 'prologue') {
      showStory(DB.prologue.text, DB.prologue.img, () => { S.step = 'before'; save(); render(); });
      return;
    }
    const m = ms();
    if(S.step === 'before')      showStory(m.storyBefore, m.imgBefore, ()=>{ S.step='quiz'; save(); render(); });
    else if(S.step === 'quiz')   showQuiz(m);
    else if(S.step === 'solved') showStory(m.storySolved, m.imgSolved, ()=>advance());
  }

  /* ── ending ── */
  function end(){
    clearInterval(tick);
    nuke();
    UI.hideHUD();

    const elapsed_ms = elapsed();
    const mins = Math.floor(elapsed_ms / 60000);
    let msg;

    if(mins < 10 && S.attempts === 1){
      msg='완벽한 수호! 단번에 클리어. 진정한 도기 탐정입니다!';
    } else if(mins < 15 && S.attempts <= 2){
      msg='훌륭한 수호! 빠르고 정확하게 임무를 완수했습니다.';
    } else if(mins < 25 && S.attempts <= 4){
      msg='성공적인 수호! 지구는 안전합니다. 다음엔 더 빠르게!';
    } else {
      msg='임무 완수! 포기하지 않는 탐정 정신이 지구를 구했습니다.';
    }

    const now = new Date();
    const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    
    // 결과 데이터 구성
    const resultData = {
      nick: S.nick,
      time: fmtTime(elapsed_ms),
      attempts: S.attempts + '회',
      msg: msg,
      date: dateStr
    };

    // 로컬 스토리지에 클리어 정보 저장
    localStorage.setItem(KEY + '_cleared', '1');
    localStorage.setItem(KEY + '_result', JSON.stringify(resultData));

    renderResult(resultData);
    UI.show('screen-ending');
    fireConfetti();
    Sfx.fanfare();
  }

  function renderResult(data) {
    document.getElementById('res-nick').textContent = data.nick;
    document.getElementById('res-time').textContent = data.time;
    document.getElementById('res-attempts').textContent = data.attempts;
    document.getElementById('grade-msg').textContent = data.msg;
    document.getElementById('res-date').textContent = data.date;
  }


  function fireConfetti() {
    const duration = 3 * 1000;
    const animationEnd = Date.now() + duration;
    const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 10000 };

    function randomInRange(min, max) {
      return Math.random() * (max - min) + min;
    }

    const interval = setInterval(function() {
      const timeLeft = animationEnd - Date.now();
      if (timeLeft <= 0) return clearInterval(interval);

      const particleCount = 50 * (timeLeft / duration);
      confetti(Object.assign({}, defaults, { 
        particleCount, 
        origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 },
        colors: ['#00F2FE', '#FFD700']
      }));
      confetti(Object.assign({}, defaults, { 
        particleCount, 
        origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 },
        colors: ['#00F2FE', '#FFD700']
      }));
    }, 250);
  }

  async function saveCertificate() {
    const area = document.getElementById('cert-area');
    const name = document.getElementById('res-nick').textContent || 'Explorer';
    const btnSave = document.getElementById('btn-save-image');
    
    const originalText = btnSave.innerText;
    btnSave.innerText = "⏳ 이미지 저장 중...";
    btnSave.disabled = true;
    
    // 버튼 숨기기 (캡처 범위 밖이지만 안전을 위해)
    btnSave.style.opacity = '0';

    try {
      const canvas = await html2canvas(area, { 
        scale: 2, 
        useCORS: true,
        backgroundColor: '#ffffff'
      });
      const link = document.createElement('a');
      link.download = `Doggy_Detective_${name}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch (e) {
      console.error(e);
      alert("이미지 저장 중 오류가 발생했습니다.");
    } finally {
      btnSave.innerText = originalText;
      btnSave.disabled = false;
      btnSave.style.opacity = '1';
    }
  }


  function preloadImages() {
    const urls = new Set();
    urls.add(DB.prologue.img);
    DB.stages.forEach(s => {
      s.missions.forEach(m => {
        if (m.imgBefore) urls.add(m.imgBefore);
        if (m.imgSolving) urls.add(m.imgSolving);
        if (m.imgSolved) urls.add(m.imgSolved);
      });
    });
    // Ending assets
    urls.add('assets/logo_cert.webp');
    urls.add('assets/caeti_explorer.webp');

    urls.forEach(u => {
      const img = new Image();
      img.src = u;
    });
    console.log(`Preloading ${urls.size} assets...`);
  }

  /* ── public ── */
  return {
    init(){
      Starfield.init();
      preloadImages();

      /* start button */
      document.getElementById('btn-start').addEventListener('click', () => {
        const nick = document.getElementById('nick').value.trim();
        if(!nick){ document.getElementById('nick').focus(); return; }
        Sfx.tap();
        S = {nick, si:0, mi:0, step:'prologue', t0:Date.now(), hints:0, attempts:1};
        save();
        UI.showHUD();
        startTick();
        render();
      });
      document.getElementById('nick').addEventListener('keydown', e => {
        if(e.key === 'Enter') document.getElementById('btn-start').click();
      });



      /* confirm overlay */
      document.getElementById('btn-ok').addEventListener('click', () => {
        if(pending){ const p=pending; pending=null; p.onOk(); }
      });
      document.getElementById('btn-cancel').addEventListener('click', () => {
        UI.closeOv('ov-confirm');
        if(pending){ const p=pending; pending=null; p.onCancel(); }
      });

      /* save image */
      document.getElementById('btn-save-image').addEventListener('click', saveCertificate);

      // 클리어 기록 확인 (결과 화면 바로 가기)
      const cleared = localStorage.getItem(KEY + '_cleared');
      const resultRaw = localStorage.getItem(KEY + '_result');
      if (cleared && resultRaw) {
        try {
          const res = JSON.parse(resultRaw);
          renderResult(res);
          UI.show('screen-ending');
          return;
        } catch(e) { console.error("Result load fail", e); }
      }

      /* resume save? */
      const raw = localStorage.getItem(KEY);
      if(raw){
        try{
          const d = JSON.parse(raw);
          if(confirm(`${d.nick} 탐정님, 이전 기록이 있습니다. 이어하시겠습니까?`)){
            S = d;
            UI.showHUD();
            startTick();
            render();
            return;
          }
        }catch(e){ localStorage.removeItem(KEY); }
      }

      // No save — show intro
      UI.show('screen-intro');
    }

  };
})();

window.addEventListener('load', ()=>Game.init());
</script>
